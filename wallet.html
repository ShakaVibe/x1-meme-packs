<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wallet Checker — X1 Meme Packs</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a1020; --bg2:#0d1528; --bg-card:#111d32;
  --x1-blue:#4da6ff; --x1-cyan:#00d4ff; --x1-gold:#f0b90b;
  --x1-gradient:linear-gradient(135deg,#4da6ff 0%,#00d4ff 100%);
  --gold:#f5c842;
  --text-primary:#ffffff; --text-secondary:#8a8f98; --text-dim:#5a5f68;
  --border:#1e3050; --border-light:#2a3f5f; --border-blue:rgba(77,166,255,0.2);
  --radius-md:8px; --radius-lg:12px; --radius-xl:16px;
  --font-display:'Bebas Neue',sans-serif; --font-body:'Space Grotesk',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-body);overflow-x:hidden;min-height:100vh}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:64px;background:rgba(10,16,32,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo img{height:36px;width:36px;border-radius:8px;object-fit:cover}
.nav-logo-div{width:1px;height:22px;background:var(--border-light)}
.nav-logo-text{font-family:var(--font-display);font-size:1.5rem;letter-spacing:.06em;color:var(--text-primary)}
.nav-logo-text .m{color:var(--gold)} .nav-logo-text .p{color:var(--x1-cyan)}
.nav-back{font-size:.88rem;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:color .2s}
.nav-back:hover{color:var(--x1-cyan)}

.page{max-width:960px;margin:0 auto;padding:100px 2rem 5rem}
.page-label{font-size:.75rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--x1-cyan);margin-bottom:.8rem;display:block;text-align:center}
.page-title{font-family:var(--font-display);font-size:clamp(2.8rem,6vw,4.5rem);line-height:1;letter-spacing:.03em;text-align:center;margin-bottom:.8rem}
.page-sub{font-size:1rem;color:var(--text-secondary);text-align:center;max-width:500px;margin:0 auto 2.5rem;line-height:1.7}

.search-wrap{margin-bottom:2rem}
.search-label{display:none}
.search-row{display:flex;gap:.75rem}
.search-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--radius-md);padding:.75rem 1rem;font-family:var(--font-mono);font-size:.85rem;color:var(--text-primary);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--text-dim)}
.search-input:focus{border-color:rgba(77,166,255,.45)}
.search-btn{font-size:.88rem;font-weight:700;letter-spacing:.05em;color:#ffffff;background:linear-gradient(135deg,rgba(77,166,255,.35) 0%,rgba(0,212,255,.2) 100%);border:1px solid rgba(77,166,255,.55);padding:.75rem 1.8rem;border-radius:var(--radius-md);cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 4px 24px rgba(77,166,255,.2),inset 0 1px 0 rgba(255,255,255,.15);backdrop-filter:blur(8px)}
.search-btn:hover{background:linear-gradient(135deg,rgba(77,166,255,.5) 0%,rgba(0,212,255,.35) 100%);border-color:rgba(0,212,255,.75);box-shadow:0 4px 32px rgba(77,166,255,.35),inset 0 1px 0 rgba(255,255,255,.2);transform:translateY(-1px)}
.search-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.status{display:none;margin-top:.9rem;padding:.6rem 1rem;border-radius:var(--radius-md);font-size:.82rem;font-family:var(--font-mono)}
.status.loading{display:block;background:rgba(77,166,255,.07);border:1px solid rgba(77,166,255,.2);color:var(--x1-blue)}
.status.error{display:block;background:rgba(255,45,120,.07);border:1px solid rgba(255,45,120,.2);color:#ff6b9d}


.section-head{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;margin-top:1rem}
.section-head h3{font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-secondary);white-space:nowrap}
.section-line{flex:1;height:1px;background:var(--border)}

.special-grid{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-bottom:.25rem}
.meme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}

/* Cards */
.token-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.4rem;text-align:center;position:relative;transition:border-color .25s,transform .2s,opacity .25s}
.token-card.special{padding:.8rem 1.3rem;width:230px;flex-shrink:0;display:flex;flex-direction:row;align-items:center;gap:1rem;text-align:left}
.token-card.has-balance:hover{transform:translateY(-3px)}
.token-card.zero-balance{opacity:.3;filter:grayscale(0.55)}

.token-logo{width:56px;height:56px;border-radius:50%;margin:0 auto .85rem;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);overflow:hidden;flex-shrink:0}
.token-card.special .token-logo{width:44px;height:44px;margin:0;flex-shrink:0}
.token-logo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.token-name{font-size:.88rem;font-weight:600;color:var(--text-primary);margin-bottom:.18rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.token-card.special .token-name{font-size:.95rem;font-weight:700;color:#ffffff;margin-bottom:.25rem}
.token-sym{font-family:var(--font-mono);font-size:.66rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.65rem}
.token-balance{font-family:var(--font-display);font-size:1.5rem;line-height:1}
.token-card.special .token-balance{font-size:1.25rem}
.token-balance.zero{color:var(--text-dim);font-size:1.1rem}
.token-balance-label{font-size:.6rem;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem}
.token-card.special .token-balance-label{display:none}

.results{display:block}

.page-bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(77,166,255,.08) 0%,transparent 60%),var(--bg);pointer-events:none}

@media(max-width:600px){nav{padding:0 1.2rem}.search-row{flex-direction:column}.page{padding:90px 1.2rem 4rem}}

.trade-btn{display:inline-flex;align-items:center;gap:.6rem;font-size:.92rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#ffffff;background:linear-gradient(135deg,rgba(77,166,255,.3) 0%,rgba(0,212,255,.18) 100%);border:1px solid rgba(77,166,255,.5);padding:.9rem 2.6rem;border-radius:var(--radius-md);text-decoration:none;box-shadow:0 4px 32px rgba(77,166,255,.2),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(8px);transition:all .2s}
.trade-btn:hover{background:linear-gradient(135deg,rgba(77,166,255,.48) 0%,rgba(0,212,255,.32) 100%);border-color:rgba(0,212,255,.7);box-shadow:0 6px 40px rgba(77,166,255,.38),inset 0 1px 0 rgba(255,255,255,.18);transform:translateY(-2px)}
</style>
</head>
<body>
<div class="page-bg"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="x1-logo.png" alt="X1"/>
    <div class="nav-logo-div"></div>
    <span class="nav-logo-text"><span class="m">MEME</span> <span class="p">PACKS</span></span>
  </a>
  <a href="index.html" class="nav-back">← Back to Home</a>
</nav>

<div class="page">
  <span class="page-label">X1 Blockchain</span>
  <h1 class="page-title">WALLET CHECKER</h1>
  <p class="page-sub">Paste any X1 wallet address to check your meme pack token balances.</p>

  <div class="search-wrap">
    <div class="search-row">
      <input type="text" class="search-input" id="wallet-input" placeholder="Paste X1 wallet address..." autocomplete="off" spellcheck="false"/>
      <button class="search-btn" id="search-btn" onclick="checkWallet()">Check Wallet</button>
    </div>
    <div class="status" id="status"></div>
  </div>


  <div class="results visible" id="results">
    <div class="section-head"><div class="section-line"></div><h3>Network Tokens</h3><div class="section-line"></div></div>
    <div class="special-grid" id="special-grid"></div>

    <div class="section-head"><div class="section-line"></div><h3>Meme Pack Tokens</h3><div class="section-line"></div></div>
    <div class="meme-grid" id="meme-grid"></div>

    <div style="text-align:center;margin-top:2.5rem;">
      <a href="https://app.xdex.xyz/swap" target="_blank" class="trade-btn">Trade Your Tokens →</a>
    </div>
  </div>
</div>

<script>
const RPC_ENDPOINTS = [
  'https://rpc.mainnet.x1.xyz',
  'https://mainnet.x1.xyz/rpc',
];

async function rpcCall(body, id=1) {
  for (const rpc of RPC_ENDPOINTS) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const resp = await fetch(rpc, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jsonrpc: '2.0', id, ...body }),
        signal: controller.signal,
      });
      clearTimeout(timeout);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.error && data.error.code === -32005) continue; // node behind
      return data;
    } catch(e) { /* try next */ }
  }
  throw new Error('All RPC endpoints failed — the X1 RPC may be temporarily down or may need to whitelist this domain (shakavibe.github.io). Try again shortly.');
}

const FALLBACK_TOKENS = [
  {name:'BonkX1',   symbol:'BONK',   color:'#f5a623', address:''},
  {name:'DogWifX1', symbol:'WIF',    color:'#9b59b6', address:''},
  {name:'PopcatX1', symbol:'POPCAT', color:'#e74c3c', address:''},
  {name:'MyroX1',   symbol:'MYRO',   color:'#1abc9c', address:''},
  {name:'BookX1',   symbol:'BOOK',   color:'#4da6ff', address:''},
  {name:'SamoX1',   symbol:'SAMO',   color:'#e67e22', address:''},
  {name:'ChillX1',  symbol:'CHILL',  color:'#00d4ff', address:''},
  {name:'MoonsX1',  symbol:'MOONS',  color:'#ff2d78', address:''},
  {name:'PepeX1',   symbol:'PEPE',   color:'#27ae60', address:''},
  {name:'XNT',      symbol:'XNT',    color:'#f0b90b', address:''},
];

function loadPackTokens() {
  try {
    const saved = localStorage.getItem('x1mp_tokens');
    if (saved) {
      const parsed = JSON.parse(saved);
      const filtered = parsed.filter(t => t && (t.name || t.symbol));
      if (filtered.length) return filtered;
    }
  } catch(e) {}
  return FALLBACK_TOKENS;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function shortAddr(addr) { return addr.slice(0,6)+'...'+addr.slice(-4); }

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function fmtBalance(n, dec) {
  if (!n || n === 0) return '0';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(2)+'M';
  if (n >= 1_000)     return (n/1_000).toFixed(2)+'K';
  return n.toLocaleString(undefined, {maximumFractionDigits: Math.min(dec||0, 4)});
}

function buildCard({name, symbol, color, image, balance, decimals, special}) {
  const c       = color || '#4da6ff';
  const hasbal  = balance > 0;
  const bg      = hexToRgba(c, hasbal ? 0.15 : 0.06);
  const sym     = (symbol || '???').toUpperCase();
  const balStr  = fmtBalance(balance, decimals || 0);

  const logoInner = image
    ? `<img src="${image}" alt="${sym}" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=\\'font-family:var(--font-display);color:${c};font-size:1rem;\\'>${sym.slice(0,3)}</span>')" />`
    : `<span style="font-family:var(--font-display);color:${c};font-size:${special?'1.3':'1rem'};">${sym.slice(0,3)}</span>`;

  const card = document.createElement('div');
  card.className = ['token-card', special?'special':'', hasbal?'has-balance':'zero-balance'].join(' ').trim();
  if (hasbal) card.style.borderColor = hexToRgba(c, 0.4);

  card.innerHTML = `
    <div class="token-logo" style="background:${bg};">${logoInner}</div>
    <div class="token-name">${name || sym}</div>
    <div class="token-sym">${sym}</div>
    <div class="token-balance ${hasbal?'':'zero'}" ${hasbal?`style="color:${c}"`:''}>${hasbal ? balStr : '—'}</div>
    <div class="token-balance-label">${hasbal ? 'Balance' : 'Not in wallet'}</div>
  `;
  return card;
}

// Render all tokens faded on page load
function renderAll(mintMap) {
  const packTokens = loadPackTokens();
  const memeGrid  = document.getElementById('meme-grid');
  const specGrid  = document.getElementById('special-grid');
  memeGrid.innerHTML = ''; specGrid.innerHTML = '';

  // XNT
  const xntBal = mintMap ? (window._xntBal || 0) : 0;
  specGrid.appendChild(buildCard({
    name:'XNT', symbol:'XNT', color:'#4da6ff',
    image:'x1-logo.png', balance:xntBal, decimals:9, special:true,
  }));

  // USDC.X
  const USDC_MINT = 'B69chRzqzDCmdB5WYB8NRu5Yv5ZA95ABiZcdzCgGm9Tq';
  const usdcToken = packTokens.find(t => /usdc/i.test(t.symbol));
  let usdcBal = 0, usdcDec = 6;
  if (mintMap) {
    const usdcMint = usdcToken?.address || USDC_MINT;
    if (mintMap[usdcMint]) { usdcBal = mintMap[usdcMint].uiAmount; usdcDec = mintMap[usdcMint].decimals; }
  }
  specGrid.appendChild(buildCard({
    name:  usdcToken?.name   || 'USDC.X',
    symbol:usdcToken?.symbol || 'USDC.X',
    color: '#2775ca', image: usdcToken?.image || 'usdc-logo.png',
    balance: usdcBal, decimals: usdcDec, special: true,
  }));

  // 10 meme slots
  const memeTokens = packTokens.filter(t => !/usdc/i.test(t.symbol||'')).slice(0,10);
  while (memeTokens.length < 10) memeTokens.push({name:'Token Slot',symbol:'???',color:'#2a3f5f',address:''});
  memeTokens.forEach(t => {
    const sym = (t.symbol||t.sym||'???').toUpperCase();
    let bal = 0, dec = 0;
    if (mintMap && t.address && mintMap[t.address]) { bal = mintMap[t.address].uiAmount; dec = mintMap[t.address].decimals; }
    memeGrid.appendChild(buildCard({ name:t.name||sym, symbol:sym, color:t.color||'#4da6ff', image:t.image||null, balance:bal, decimals:dec }));
  });
}

// Initial render on page load — all faded
renderAll(null);

async function checkWallet() {
  const input   = document.getElementById('wallet-input').value.trim();
  if (!input) return;

  const btn = document.getElementById('search-btn');

  btn.disabled = true; btn.textContent = 'Checking...';
  setStatus('⏳ Fetching wallet...', 'loading');

  try {
    // 1. Native XNT balance
    const xntData = await rpcCall({method:'getBalance', params:[input]});
    const xntBal  = (xntData.result?.value ?? 0) / 1e9;

    // 2. Fetch both SPL token program accounts in parallel
    const fetchTAs = (programId, id) => rpcCall({method:'getTokenAccountsByOwner', params:[input,{programId},{encoding:'jsonParsed'}]}, id).then(d=>d.result?.value||[]);

    const [spl, spl22] = await Promise.all([
      fetchTAs('TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA', 2),
      fetchTAs('TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb', 3),
    ]);

    // Build mint → {uiAmount, decimals}
    const mintMap = {};
    [...spl, ...spl22].forEach(a => {
      const info = a.account?.data?.parsed?.info;
      if (!info) return;
      mintMap[info.mint] = {
        uiAmount: info.tokenAmount.uiAmount || 0,
        decimals: info.tokenAmount.decimals,
      };
    });

    // Render everything with live balances
    window._xntBal = xntBal;
    renderAll(mintMap);
    document.getElementById('status').className = 'status';

  } catch(err) {
    setStatus('❌ ' + (err.message || 'Connection error — try again shortly.'), 'error');
    console.error(err);
  }

  btn.disabled = false; btn.textContent = 'Check Wallet';
}

document.getElementById('wallet-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkWallet();
});
</script>
</body>
</html>
